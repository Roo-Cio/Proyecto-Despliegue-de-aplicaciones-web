# apache_snippets/httpd-mpm.conf (idea de ajuste, módulo prefork típico XAMPP)
# OJO: tu instalación puede usar prefork o event. Ajusta el bloque correcto.

<IfModule mpm_prefork_module>
  StartServers             2
  MinSpareServers          2
  MaxSpareServers          5
  MaxRequestWorkers       10
  MaxConnectionsPerChild 200
</IfModule>

# Timeouts recomendados (en httpd.conf o en un conf incluido)
KeepAlive On
MaxKeepAliveRequests 100
KeepAliveTimeout 5
Timeout 30
