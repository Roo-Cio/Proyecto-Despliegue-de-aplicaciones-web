# apache_snippets/httpd-ssl.conf (fragmento)
# Activa SSL y define el vhost HTTPS para inventario.local
# Requiere: LoadModule ssl_module modules/mod_ssl.so
# y que esté incluido el fichero httpd-ssl.conf desde httpd.conf

Listen 443

<VirtualHost *:443>
  ServerName inventario.local
  DocumentRoot "/Applications/XAMPP/xamppfiles/htdocs/gestorInventario/public"

  SSLEngine on
  SSLCertificateFile "/Applications/XAMPP/xamppfiles/apache2/conf/ssl.crt/inventario.local.crt"
  SSLCertificateKeyFile "/Applications/XAMPP/xamppfiles/apache2/conf/ssl.key/inventario.local.key"

  <Directory "/Applications/XAMPP/xamppfiles/htdocs/gestorInventario/public">
    AllowOverride All
    Require all granted
  </Directory>

  ErrorLog "logs/inventario_ssl_error.log"
  CustomLog "logs/inventario_ssl_access.log" combined
</VirtualHost>
