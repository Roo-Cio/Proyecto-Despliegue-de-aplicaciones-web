# apache_snippets/httpd-vhosts.conf (fragmento)
# IMPORTANTE: Ajusta rutas a tu instalación (XAMPP/Apache).
# Windows XAMPP típico: C:/xampp/htdocs/gestorInventario/public
# macOS XAMPP típico:  /Applications/XAMPP/xamppfiles/htdocs/gestorInventario/public

<VirtualHost *:80>
  ServerName inventario.local
  DocumentRoot "/Applications/XAMPP/xamppfiles/htdocs/gestorInventario/public"

  <Directory "/Applications/XAMPP/xamppfiles/htdocs/gestorInventario/public">
    AllowOverride All
    Require all granted
  </Directory>

  ErrorLog "logs/inventario_error.log"
  CustomLog "logs/inventario_access.log" combined
</VirtualHost>
