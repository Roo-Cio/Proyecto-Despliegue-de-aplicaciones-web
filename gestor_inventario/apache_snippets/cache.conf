# apache_snippets/cache.conf
# Requiere módulos:
# LoadModule cache_module modules/mod_cache.so
# LoadModule cache_disk_module modules/mod_cache_disk.so
# LoadModule expires_module modules/mod_expires.so
# LoadModule headers_module modules/mod_headers.so

CacheQuickHandler off
CacheLock on
CacheLockPath "/Applications/XAMPP/xamppfiles/tmp/cache-lock"
CacheLockMaxAge 5

CacheRoot "/Applications/XAMPP/xamppfiles/tmp/apache-cache"
CacheEnable disk "/"
CacheDirLevels 2
CacheDirLength 1

# Cachea estáticos (CSS/JS/imagenes) y añade cabeceras
<IfModule mod_expires.c>
  ExpiresActive On
  ExpiresByType text/css "access plus 7 days"
  ExpiresByType application/javascript "access plus 7 days"
  ExpiresByType image/png "access plus 30 days"
  ExpiresByType image/jpeg "access plus 30 days"
</IfModule>

<IfModule mod_headers.c>
  <FilesMatch "\.(css|js|png|jpg|jpeg|gif|svg)$">
    Header set Cache-Control "public, max-age=604800"
  </FilesMatch>
</IfModule>
